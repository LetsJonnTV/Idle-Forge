name: Release Builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  child-tests:
    name: Child pipeline - all tests
    uses: ./.github/workflows/all-tests.yml

  build-android:
    name: Build Android APK
    needs: child-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.kts', 'android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android build
        uses: actions/cache@v4
        with:
          path: android/.gradle
          key: ${{ runner.os }}-android-build-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-build-

      - name: Install Dependencies
        run: flutter pub get

      - name: Restore google-services.json
        run: |
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          python3 -c "import json,sys; d=json.load(open('android/app/google-services.json')); print('package:', d['client'][0]['client_info']['android_client_info']['package_name']); print('clients:', len(d['client'][0]['oauth_client']))"

      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          echo '${{ secrets.ANDROID_DEBUG_KEYSTORE }}' | base64 -d > ~/.android/debug.keystore
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>&1 | grep -E "SHA1|SHA256"

      - name: Inject Build Number
        run: |
          sed -i "s/^version: \(.*\)+.*/version: \1+${{ github.run_number }}/" pubspec.yaml

      - name: Build APK
        run: flutter build apk --release --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Rename APK Artifact
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Idle-Forge-release.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/Idle-Forge-release.apk
          compression-level: 0

  build-windows:
    name: Build Windows
    needs: child-tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Remove Firebase from Windows plugins
        shell: pwsh
        run: |
          (Get-Content windows/flutter/generated_plugins.cmake) |
            Where-Object { $_ -notmatch 'firebase_core' } |
            Set-Content windows/flutter/generated_plugins.cmake -Encoding UTF8
          (Get-Content windows/flutter/generated_plugin_registrant.cc) |
            Where-Object { $_ -notmatch 'firebase_core|FirebaseCore' } |
            Set-Content windows/flutter/generated_plugin_registrant.cc -Encoding UTF8

      - name: Inject Build Number
        shell: pwsh
        run: |
          (Get-Content pubspec.yaml) -replace '^(version: .+)\+\d+$', "`$1+${{ github.run_number }}" | Set-Content pubspec.yaml

      - name: Build Windows Release
        run: flutter build windows --release --no-pub --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Package Windows Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-artifacts -Force | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath release-artifacts/idle_forge-windows.zip -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release-artifacts/idle_forge-windows.zip
          compression-level: 0

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/android-apk/Idle-Forge-release.apk
            release-artifacts/windows-build/idle_forge-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  whatsapp-release-notification:
    name: WhatsApp release notification
    runs-on: ubuntu-latest
    needs: publish-release
    env:
      WHATSAPP_WEBHOOK_URL: ${{ secrets.WHATSAPP_WEBHOOK_URL }}
    steps:
      - name: Skip when webhook is not configured
        if: ${{ env.WHATSAPP_WEBHOOK_URL == '' }}
        run: echo "WHATSAPP_WEBHOOK_URL is not configured. Skipping WhatsApp notification."

      - name: Send WhatsApp webhook message
        if: ${{ env.WHATSAPP_WEBHOOK_URL != '' }}
        run: |
          curl -G "${{ env.WHATSAPP_WEBHOOK_URL }}" \
            --data-urlencode "text=Idle Forge Release ${{ github.ref_name }} wurde veroeffentlicht."
