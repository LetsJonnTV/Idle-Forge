name: Component CI

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      app: ${{ steps.filter.outputs.app }}
      sql: ${{ steps.filter.outputs.sql }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            app:
              - 'lib/**'
              - 'test/**'
              - 'integration_test/**'
              - 'test_driver/**'
              - 'assets/**'
              - 'android/**'
              - 'windows/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'analysis_options.yaml'
            sql:
              - 'backend/supabase/**/*.sql'

  backend-lint-test:
    name: Backend lint and test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Test
        working-directory: backend
        run: npm run test

  frontend-lint-test:
    name: Frontend lint and test
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test

  app-lint-test-ui:
    name: App lint, unit and UI test
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Lint
        run: |
          dart format --output=none --set-exit-if-changed .
          flutter analyze

      - name: Unit tests
        run: flutter test --concurrency=4

      - name: UI tests (integration or widget fallback)
        shell: bash
        run: |
          if [ -d integration_test ] && flutter devices | grep -Eiq 'android|ios'; then
            flutter test integration_test
          else
            echo "No supported mobile device found - running widget smoke test instead."
            flutter test test/widget_test.dart
          fi

  android-ui-test:
    name: Android UI Test
    runs-on: ubuntu-latest
    needs:
      - changes
      - app-lint-test-ui
    if: needs.changes.outputs.app == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Android UI Smoke Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          disable-animations: true
          script: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/app_test.dart --dart-define=DISABLE_UPDATE_CHECK=true

  sql-validation:
    name: SQL validation
    needs: changes
    if: needs.changes.outputs.sql == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: idle_forge_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema.sql
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d idle_forge_ci -v ON_ERROR_STOP=1 -f backend/supabase/schema.sql

      - name: Apply seed_items.sql
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d idle_forge_ci -v ON_ERROR_STOP=1 -f backend/supabase/seed_items.sql

  backend-frontend-api-validation:
    name: Backend-Frontend API validation
    needs: changes
    if: needs.changes.outputs.backend == 'true' && needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate frontend API paths against backend routes
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          mapfile -t endpoints < <(grep -RhoE "/api/[a-zA-Z0-9_/$\{\}-]+" frontend/src | sort -u)

          if [ "${#endpoints[@]}" -eq 0 ]; then
            echo "No frontend /api endpoints found."
            exit 0
          fi

          for endpoint in "${endpoints[@]}"; do
            normalized=$(echo "$endpoint" | sed -E 's#\$\{[^}]+\}##g; s#/$##')
            route_path="${normalized#/api/}"

            if [ -f "backend/app/api/${route_path}/route.ts" ] || [ -f "backend/app/api/${route_path}/route.js" ] || [ -d "backend/app/api/${route_path}" ]; then
              echo "OK: ${endpoint}"
            else
              echo "MISSING: ${endpoint} -> backend/app/api/${route_path}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "API validation failed."
            exit 1
          fi
