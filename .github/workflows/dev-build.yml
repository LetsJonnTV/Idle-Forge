name: Dev Branch Builds

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'lib/**'
      - 'test/**'
      - 'integration_test/**'
      - 'test_driver/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend to Vercel preview'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  backend-build-dev:
    name: Build backend (dev branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

  backend-deploy-dev-vercel:
    name: Deploy backend to Vercel dev environment
    runs-on: ubuntu-latest
    needs: backend-build-dev
    if: ${{ vars.ENABLE_DEV_VERCEL_DEPLOY == 'true' || inputs.deploy_backend == 'true' || inputs.deploy_backend == true }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID_BACKEND: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel-config
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID_BACKEND" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy because secrets are missing
        if: ${{ steps.vercel-config.outputs.can_deploy != 'true' }}
        run: echo "Skipping Vercel dev deploy. Missing one or more secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_BACKEND."

      - name: Setup Node.js
        if: ${{ steps.vercel-config.outputs.can_deploy == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: ${{ steps.vercel-config.outputs.can_deploy == 'true' }}
        run: npm ci

      - name: Pull Vercel preview environment
        if: ${{ steps.vercel-config.outputs.can_deploy == 'true' }}
        run: npx vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID_BACKEND }}

      - name: Build backend for Vercel preview
        if: ${{ steps.vercel-config.outputs.can_deploy == 'true' }}
        run: npx vercel build --token=${{ env.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID_BACKEND }}

      - name: Deploy backend preview
        if: ${{ steps.vercel-config.outputs.can_deploy == 'true' }}
        run: npx vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID_BACKEND }}

  backend-deploy-dev-skipped:
    name: Backend dev deploy skipped
    runs-on: ubuntu-latest
    needs: backend-build-dev
    if: ${{ !(vars.ENABLE_DEV_VERCEL_DEPLOY == 'true' || inputs.deploy_backend == 'true' || inputs.deploy_backend == true) }}
    steps:
      - name: Notice
        run: echo "Skipping Vercel dev deploy. Set repo variable ENABLE_DEV_VERCEL_DEPLOY=true or run workflow_dispatch with deploy_backend=true, and configure VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_BACKEND."

  flutter-dev-api-build:
    name: Build Android APK with DEV API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build dev APK
        env:
          DEV_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
        run: |
          if [ -z "$DEV_API_BASE_URL" ]; then
            echo "Missing secret DEV_API_BASE_URL"
            exit 1
          fi
          flutter build apk --debug --dart-define=API_BASE_URL=$DEV_API_BASE_URL

      - name: Upload dev APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: idle-forge-dev-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          compression-level: 0
