name: Dev Branch Builds

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'lib/**'
      - 'test/**'
      - 'integration_test/**'
      - 'test_driver/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend to Cloud Run DEV'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  backend-build-dev:
    name: Build backend (dev branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

  backend-deploy-dev-gcp:
    name: Deploy backend to Cloud Run dev environment
    runs-on: ubuntu-latest
    needs: backend-build-dev
    if: ${{ vars.ENABLE_DEV_GCP_DEPLOY == 'true' || inputs.deploy_backend == 'true' || inputs.deploy_backend == true }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
      GCP_DEV_SERVICE: ${{ vars.GCP_DEV_SERVICE }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve defaults
        id: defaults
        run: |
          echo "project=${GCP_PROJECT_ID:-astral-theory-449511-c1}" >> "$GITHUB_OUTPUT"
          echo "region=${GCP_REGION:-europe-west3}" >> "$GITHUB_OUTPUT"
          echo "repo=${GCP_ARTIFACT_REPO:-idle-forge}" >> "$GITHUB_OUTPUT"
          echo "service=${GCP_DEV_SERVICE:-idle-forge-api-dev}" >> "$GITHUB_OUTPUT"

      - name: Check GCP auth secrets
        id: gcp-config
        run: |
          if [ -n "${{ secrets.GCP_WIF_PROVIDER }}" ] && [ -n "${{ secrets.GCP_DEPLOYER_SA }}" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy because secrets are missing
        if: ${{ steps.gcp-config.outputs.can_deploy != 'true' }}
        run: echo "Skipping GCP dev deploy. Missing secrets GCP_WIF_PROVIDER and/or GCP_DEPLOYER_SA."

      - name: Authenticate to Google Cloud
        if: ${{ steps.gcp-config.outputs.can_deploy == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Setup gcloud
        if: ${{ steps.gcp-config.outputs.can_deploy == 'true' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: ${{ steps.gcp-config.outputs.can_deploy == 'true' }}
        run: gcloud auth configure-docker "${{ steps.defaults.outputs.region }}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        if: ${{ steps.gcp-config.outputs.can_deploy == 'true' }}
        run: |
          IMAGE="${{ steps.defaults.outputs.region }}-docker.pkg.dev/${{ steps.defaults.outputs.project }}/${{ steps.defaults.outputs.repo }}/idle-forge-backend:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
        id: image

      - name: Deploy backend to Cloud Run DEV
        if: ${{ steps.gcp-config.outputs.can_deploy == 'true' }}
        run: |
          gcloud run deploy "${{ steps.defaults.outputs.service }}" \
            --project "${{ steps.defaults.outputs.project }}" \
            --region "${{ steps.defaults.outputs.region }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --image "${{ steps.image.outputs.image }}" \
            --set-env-vars "DEBUG=false" \
            --set-secrets "JWT_SECRET=jwt-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,DATABASE_URL=database-url:latest"

  backend-deploy-dev-skipped:
    name: Backend dev deploy skipped
    runs-on: ubuntu-latest
    needs: backend-build-dev
    if: ${{ !(vars.ENABLE_DEV_GCP_DEPLOY == 'true' || inputs.deploy_backend == 'true' || inputs.deploy_backend == true) }}
    steps:
      - name: Notice
        run: echo "Skipping Cloud Run dev deploy. Set repo variable ENABLE_DEV_GCP_DEPLOY=true or run workflow_dispatch with deploy_backend=true, and configure GCP_WIF_PROVIDER + GCP_DEPLOYER_SA secrets."

  flutter-dev-api-build:
    name: Build Android APK with DEV API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build dev APK
        env:
          DEV_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
        run: |
          if [ -z "$DEV_API_BASE_URL" ]; then
            echo "Missing secret DEV_API_BASE_URL"
            exit 1
          fi
          flutter build apk --debug --dart-define=API_BASE_URL=$DEV_API_BASE_URL

      - name: Upload dev APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: idle-forge-dev-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          compression-level: 0
