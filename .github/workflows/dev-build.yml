name: Dev Branch Builds

on:
  push:
    branches:
      - dev
    paths:
      - 'lib/**'
      - 'test/**'
      - 'integration_test/**'
      - 'test_driver/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/dev-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flutter-dev-api-build:
    name: Build Android APK with DEV API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build dev APK
        env:
          DEV_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
        run: |
          if [ -z "$DEV_API_BASE_URL" ]; then
            echo "Missing secret DEV_API_BASE_URL"
            exit 1
          fi
          flutter build apk --debug --dart-define=API_BASE_URL=$DEV_API_BASE_URL

      - name: Upload dev APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: idle-forge-dev-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          compression-level: 0
