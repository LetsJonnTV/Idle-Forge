name: Tag On Main Release Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-tag:
    name: Create tag from release bump commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_GH_PAT }}

      - name: Detect release bump commit message
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          current_version_line="$(grep -E '^version: ' pubspec.yaml | head -n1 || true)"
          previous_version_line="$(git show HEAD^:pubspec.yaml 2>/dev/null | grep -E '^version: ' | head -n1 || true)"

          if [[ -z "$current_version_line" ]]; then
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_version="$(printf '%s\n' "$current_version_line" | sed -E 's/^version: ([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)$/\1/')"
          current_build="$(printf '%s\n' "$current_version_line" | sed -E 's/^version: ([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)$/\2/')"
          previous_version="$(printf '%s\n' "$previous_version_line" | sed -E 's/^version: ([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)$/\1/')"

          if [[ -n "$current_version" && "$current_build" == "0" && "$current_version" != "$previous_version" ]]; then
            echo "version=v${current_version}" >> "$GITHUB_OUTPUT"
            echo "should_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-release commits
        if: ${{ steps.detect.outputs.should_tag != 'true' }}
        run: echo "Current main commit is not a release version bump. Nothing to tag."

      - name: Create and push tag
        if: ${{ steps.detect.outputs.should_tag == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.detect.outputs.version }}"

          if [ -z "${{ secrets.BOT_GH_PAT }}" ]; then
            echo "Missing BOT_GH_PAT secret. A PAT is required so the tag push triggers the release workflow."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${version}" >/dev/null 2>&1; then
            echo "Tag ${version} already exists. Skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "Release $version"
          git push origin "$version"
