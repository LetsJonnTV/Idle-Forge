name: Branch Rules

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches-ignore:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce-main-pr-source:
    name: Enforce main PR source branch
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch for main
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Pull requests to main are only allowed from dev."
            echo "Current source branch: ${{ github.head_ref }}"
            exit 1
          fi

  enforce-branch-naming-pr:
    name: Enforce branch naming on PR
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source branch name
        shell: bash
        run: |
          branch="${{ github.head_ref }}"

          # Allow long-lived integration branches
          if [[ "$branch" == "main" || "$branch" == "dev" ]]; then
            exit 0
          fi

          pattern='^(task|fix|feat)/issue_[0-9]+/[a-z0-9-]+$'
          if [[ ! "$branch" =~ $pattern ]]; then
            echo "Invalid branch name: $branch"
            echo "Expected: {task|fix|feat}/issue_<number>/<short-description>"
            echo "Example: feat/issue_123/add-login-screen"
            exit 1
          fi

  enforce-branch-naming-push:
    name: Enforce branch naming on push
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate pushed branch name
        shell: bash
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          pattern='^(task|fix|feat)/issue_[0-9]+/[a-z0-9-]+$'

          if [[ ! "$branch" =~ $pattern ]]; then
            echo "Invalid branch name: $branch"
            echo "Expected: {task|fix|feat}/issue_<number>/<short-description>"
            echo "Example: fix/issue_456/null-pointer-on-save"
            exit 1
          fi
