name: Manual Tag and Release Trigger

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (example: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Create release tag on main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BOT_GH_PAT }}

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match vMAJOR.MINOR.PATCH, e.g. v1.0.0"
            exit 1
          fi

      - name: Create and push release tag
        run: |
          VERSION_TAG="${{ inputs.version }}"
          if [ -z "${{ secrets.BOT_GH_PAT }}" ]; then
            echo "Missing BOT_GH_PAT secret. A PAT is required so the tag push triggers the release workflow."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION_TAG}" >/dev/null 2>&1; then
            echo "Tag ${VERSION_TAG} already exists. Skipping."
            exit 0
          fi

          git tag -a "${VERSION_TAG}" -m "Release ${VERSION_TAG}"
          git push origin "${VERSION_TAG}"
