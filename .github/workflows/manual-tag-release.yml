name: Manual Tag and Release Trigger

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (example: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  tag-and-release:
    name: Create release bump PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match vMAJOR.MINOR.PATCH, e.g. v1.0.0"
            exit 1
          fi

      - name: Set version in package and pubspec files
        run: |
          VERSION_TAG="${{ inputs.version }}"
          VERSION_RAW="${VERSION_TAG#v}"
          export VERSION_RAW

          node -e "const fs=require('fs'); const paths=['backend/package.json','frontend/package.json','backend/package-lock.json','frontend/package-lock.json']; const v=process.env.VERSION_RAW; for (const p of paths) { const data=JSON.parse(fs.readFileSync(p,'utf8')); data.version=v; fs.writeFileSync(p, JSON.stringify(data,null,2)+'\\n'); }" 

          sed -E -i "s/^version: .*/version: ${VERSION_RAW}+0/" pubspec.yaml

      - name: Commit and push release branch
        run: |
          VERSION_TAG="${{ inputs.version }}"
          RELEASE_BRANCH="chore/release-${VERSION_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/package.json frontend/package.json backend/package-lock.json frontend/package-lock.json pubspec.yaml
          git commit -m "chore(release): bump version to ${VERSION_TAG}" || echo "No changes to commit"
          git switch -c "${RELEASE_BRANCH}"
          git push origin "${RELEASE_BRANCH}" --force-with-lease

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION_TAG="${{ inputs.version }}"
          RELEASE_BRANCH="chore/release-${VERSION_TAG}"

          existing_pr=$(gh pr list \
            --base main \
            --head "${RELEASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "${existing_pr}" ]; then
            echo "PR already exists: #${existing_pr}"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${RELEASE_BRANCH}" \
            --title "chore(release): bump version to ${VERSION_TAG}" \
            --body "Automated release bump for ${VERSION_TAG}. Merge this PR to main to trigger automatic tag creation and release pipeline."
