<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#1a2a4a"/>
  <!-- Globe circle -->
  <circle cx="64" cy="58" r="34" fill="#254878" stroke="#4a8ade" stroke-width="4"/>
  <!-- Globe meridian lines -->
  <ellipse cx="64" cy="58" rx="16" ry="34" fill="none" stroke="#4a8ade" stroke-width="2.5"/>
  <!-- Latitude lines -->
  <line x1="30" y1="58" x2="98" y2="58" stroke="#4a8ade" stroke-width="2.5"/>
  <ellipse cx="64" cy="40" rx="30" ry="8" fill="none" stroke="#4a8ade" stroke-width="2"/>
  <ellipse cx="64" cy="76" rx="30" ry="8" fill="none" stroke="#4a8ade" stroke-width="2"/>
  <!-- Signal / activity dots -->
  <circle cx="64" cy="104" r="5" fill="#4a8ade"/>
  <circle cx="50" cy="104" r="4" fill="#4a8ade" opacity="0.6"/>
  <circle cx="78" cy="104" r="4" fill="#4a8ade" opacity="0.6"/>
  <circle cx="38" cy="104" r="3" fill="#4a8ade" opacity="0.35"/>
  <circle cx="90" cy="104" r="3" fill="#4a8ade" opacity="0.35"/>
</svg>
